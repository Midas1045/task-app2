apiVersion: v1
kind: Service
metadata:
  name: monitoring-grafana
  namespace: default

spec:
  type: NodePort

  selector:
    app.kubernetes.io/instance: monitoring
    app.kubernetes.io/name: grafana

  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 3000
    nodePort: 32000




